<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d5a87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient)"/>
  
  <!-- Abstract Map Grid -->
  <g opacity="0.1">
    <line x1="100" y1="0" x2="100" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Connection Lines (Network Effect) -->
  <g opacity="0.3">
    <path d="M150 280 Q250 200 350 280" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
    <path d="M350 280 Q450 200 550 280" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
    <path d="M550 280 Q650 200 750 280" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
    
    <circle cx="250" cy="240" r="4" fill="#60a5fa"/>
    <circle cx="450" cy="240" r="4" fill="#60a5fa"/>
    <circle cx="650" cy="240" r="4" fill="#60a5fa"/>
  </g>
  
  <!-- Road -->
  <path d="M0 320 L800 320 L800 400 L0 400 Z" fill="url(#roadGradient)"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#fbbf24" stroke-width="2" stroke-dasharray="20 20" opacity="0.8"/>
  
  <!-- Truck 1 - Main (Modern Style) -->
  <g transform="translate(120, 235)">
    <!-- Truck Body -->
    <rect x="0" y="25" width="120" height="50" rx="8" fill="#3b82f6"/>
    <rect x="70" y="0" width="50" height="45" rx="8" fill="#60a5fa"/>
    <!-- Cab Window -->
    <rect x="80" y="8" width="35" height="20" rx="4" fill="#dbeafe"/>
    <!-- Wheels -->
    <circle cx="25" cy="82" r="14" fill="#1f2937"/>
    <circle cx="25" cy="82" r="8" fill="#6b7280"/>
    <circle cx="95" cy="82" r="14" fill="#1f2937"/>
    <circle cx="95" cy="82" r="8" fill="#6b7280"/>
    <!-- Open Source Badge -->
    <circle cx="35" cy="40" r="12" fill="#10b981"/>
    <path d="M30 40 L35 45 L42 35" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Truck 2 - Mid Distance -->
  <g transform="translate(340, 255) scale(0.85)">
    <rect x="0" y="25" width="120" height="50" rx="8" fill="#8b5cf6"/>
    <rect x="70" y="0" width="50" height="45" rx="8" fill="#a78bfa"/>
    <rect x="80" y="8" width="35" height="20" rx="4" fill="#ede9fe"/>
    <circle cx="25" cy="82" r="14" fill="#1f2937"/>
    <circle cx="25" cy="82" r="8" fill="#6b7280"/>
    <circle cx="95" cy="82" r="14" fill="#1f2937"/>
    <circle cx="95" cy="82" r="8" fill="#6b7280"/>
    <!-- GPS Signal -->
    <path d="M95 0 Q105 -15 115 0" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M92 -5 Q105 -25 118 -5" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Truck 3 - Distance -->
  <g transform="translate(540, 265) scale(0.7)">
    <rect x="0" y="25" width="120" height="50" rx="8" fill="#10b981"/>
    <rect x="70" y="0" width="50" height="45" rx="8" fill="#34d399"/>
    <rect x="80" y="8" width="35" height="20" rx="4" fill="#d1fae5"/>
    <circle cx="25" cy="82" r="14" fill="#1f2937"/>
    <circle cx="25" cy="82" r="8" fill="#6b7280"/>
    <circle cx="95" cy="82" r="14" fill="#1f2937"/>
    <circle cx="95" cy="82" r="8" fill="#6b7280"/>
  </g>
  
  <!-- Floating Icons/Data Elements -->
  <g opacity="0.9">
    <!-- Code Block -->
    <rect x="620" y="60" width="100" height="70" rx="8" fill="#ffffff" opacity="0.95"/>
    <rect x="620" y="60" width="100" height="18" rx="8" fill="#1f2937"/>
    <circle cx="632" cy="69" r="4" fill="#ef4444"/>
    <circle cx="645" cy="69" r="4" fill="#fbbf24"/>
    <circle cx="658" cy="69" r="4" fill="#10b981"/>
    <rect x="635" y="88" width="50" height="6" rx="3" fill="#3b82f6" opacity="0.6"/>
    <rect x="635" y="100" width="70" height="6" rx="3" fill="#60a5fa" opacity="0.4"/>
    <rect x="635" y="112" width="40" height="6" rx="3" fill="#3b82f6" opacity="0.6"/>
    
    <!-- Location Pins -->
    <g transform="translate(200, 100)">
      <path d="M0 20 C0 9 9 0 20 0 C31 0 40 9 40 20 C40 31 20 50 20 50 C20 50 0 31 0 20 Z" fill="#ef4444" opacity="0.9"/>
      <circle cx="20" cy="18" r="8" fill="#ffffff"/>
      <circle cx="20" cy="18" r="4" fill="#ef4444"/>
    </g>
    
    <g transform="translate(500, 80)">
      <path d="M0 15 C0 6.7 6.7 0 15 0 C23.3 0 30 6.7 30 15 C30 23.3 15 37.5 15 37.5 C15 37.5 0 23.3 0 15 Z" fill="#f59e0b" opacity="0.8"/>
      <circle cx="15" cy="13" r="6" fill="#ffffff"/>
      <circle cx="15" cy="13" r="3" fill="#f59e0b"/>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="50" r="30" fill="#3b82f6" opacity="0.1"/>
  <circle cx="750" cy="150" r="40" fill="#10b981" opacity="0.1"/>
  <circle cx="400" cy="50" r="20" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Data Stream Lines -->
  <g opacity="0.4">
    <line x1="650" y1="200" x2="650" y2="280" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="8" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="670" y1="190" x2="670" y2="280" stroke="#34d399" stroke-width="2" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="8" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
