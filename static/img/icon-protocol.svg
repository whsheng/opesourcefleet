<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Protocol Hub Icon - Data Flow/Network -->
  <rect x="30" y="40" width="140" height="120" rx="10" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Central Server/Hub -->
  <rect x="85" y="85" width="30" height="40" rx="4" fill="#ffffff" stroke="#8b5cf6" stroke-width="3"/>
  <rect x="90" y="90" width="20" height="4" rx="2" fill="#8b5cf6" opacity="0.3"/>
  <rect x="90" y="98" width="15" height="4" rx="2" fill="#8b5cf6" opacity="0.3"/>
  <rect x="90" y="106" width="18" height="4" rx="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="100" cy="120" r="3" fill="#8b5cf6"/>
  
  <!-- Connected Devices -->
  <rect x="50" y="60" width="25" height="25" rx="4" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <rect x="55" y="67" width="15" height="3" rx="1" fill="#a78bfa"/>
  <rect x="55" y="73" width="10" height="3" rx="1" fill="#c4b5fd"/>
  
  <rect x="125" y="60" width="25" height="25" rx="4" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <rect x="130" y="67" width="15" height="3" rx="1" fill="#a78bfa"/>
  <rect x="130" y="73" width="10" height="3" rx="1" fill="#c4b5fd"/>
  
  <rect x="50" y="125" width="25" height="25" rx="4" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <rect x="55" y="132" width="15" height="3" rx="1" fill="#a78bfa"/>
  <rect x="55" y="138" width="10" height="3" rx="1" fill="#c4b5fd"/>
  
  <rect x="125" y="125" width="25" height="25" rx="4" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <rect x="130" y="132" width="15" height="3" rx="1" fill="#a78bfa"/>
  <rect x="130" y="138" width="10" height="3" rx="1" fill="#c4b5fd"/>
  
  <!-- Connection Lines -->
  <line x1="75" y1="72" x2="85" y2="95" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="125" y1="72" x2="115" y2="95" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="75" y1="137" x2="85" y2="115" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="125" y1="137" x2="115" y2="115" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 2"/>
  
  <!-- Data Packets -->
  <circle cx="80" cy="82" r="3" fill="#7c3aed"/>
  <circle cx="120" cy="82" r="3" fill="#7c3aed"/>
  <circle cx="80" cy="127" r="3" fill="#7c3aed"/>
  <circle cx="120" cy="127" r="3" fill="#7c3aed"/>
</svg>
